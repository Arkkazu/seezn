  <script>
    // ドキュメントのコンテンツが完全に読み込まれた後に実行されるイベントリスナーを設定します。
    document.addEventListener('DOMContentLoaded', () => {

      // スムーズスクロールを実行するための関数を定義します。引数`element`はスクロールの目的地となる要素です。
      const smoothScrollTo = (element) => {
        // ページ上部にある`header`要素の高さを取得します。`header`がない場合は0を使います。
        const headerHeight = document.querySelector('header') ? document.querySelector('header').offsetHeight : 0;
        // 目的地要素のページ上での位置から、`header`の高さを引いた値を計算します。これがスクロール先の位置になります。
        const position = element.getBoundingClientRect().top + window.pageYOffset - headerHeight;

        // 計算した位置までページをスムーズにスクロールさせます。
        window.scrollTo({
          top: position,
          behavior: 'smooth'
        });
      };

      // ページ内の全てのアンカーリンク（href属性が'#'で始まるリンク）に対してイベントリスナーを設定します。
      document.querySelectorAll("a[href^='#']").forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          // リンクのデフォルトの挙動（ページの即時ジャンプ）をキャンセルします。
          e.preventDefault();
          // クリックされたアンカーリンクのhref属性から、スクロール先のIDを取得します。
          const href = this.getAttribute('href');
          // hrefが"#"または空文字の場合は、document.body（ページの最上部）をスクロール先とします。それ以外の場合は、hrefで指定されたIDを持つ要素を探します。
          const targetElement = href === "#" || href === "" ? document.body : document.querySelector(href);
          // 計算したスクロール先にスムーズスクロールを実行します。
          smoothScrollTo(targetElement);
        });
      });

      // 新たに追加: 絶対パスを含むリンクに対応
      document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('click', function (e) {
          const url = new URL(this.href, window.location.href);
          const currentPath = window.location.pathname;
          if (url.pathname === currentPath && url.hash) {
            // ページ内のセクションへのリンクである場合
            const targetElement = document.querySelector(url.hash);
            if (targetElement) {
              e.preventDefault(); // デフォルトの挙動をキャンセル
              smoothScrollTo(targetElement); // スムーズスクロールを実行
            }
          }
        });
      });

      // ページが完全にロードされた後に実行されるイベントリスナーを設定します。
      window.addEventListener('load', () => {
        // URLにハッシュ（#）が含まれている場合、そのハッシュに対応する要素にスムーズスクロールします。
        if (location.hash) {
          // setTimeoutを使って、スクロール処理を非同期で実行します。これにより、ページが完全にロードされるのを待ちます。
          setTimeout(() => {
            // location.hashに対応する要素を探します。
            const target = document.querySelector(location.hash);
            if (target) {
              // ページの最上部に一旦スクロールします。
              window.scrollTo(0, 0);
              // 再度setTimeoutを使って、実際のスムーズスクロール処理を非同期で実行します。
              setTimeout(() => smoothScrollTo(target), 0); // 遅延してからスクロール
            }
          }, 0);
        }
      });
    });
